<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" role="img" aria-labelledby="dna-title dna-desc" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <title id="dna-title">DNA double-helix structure with base-pair labels</title>
  <desc id="dna-desc">Schematic of DNA double helix showing antiparallel sugar-phosphate backbones (5' to 3' and 3' to 5'), complementary base pairing (Adenine-Thymine via 2 hydrogen bonds, Guanine-Cytosine via 3 hydrogen bonds), and major/minor groove labels.</desc>

  <rect width="800" height="520" fill="#f8fafc"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" fill="#0f172a" font-size="20" font-weight="700">DNA Double Helix — Watson &amp; Crick Model</text>
  <text x="400" y="54" text-anchor="middle" fill="#475569" font-size="13">Antiparallel sugar-phosphate backbones with complementary base pairing</text>

  <!-- ===== DNA ladder (untwisted for clarity) ===== -->
  <!-- Note: Twisted helix is hard to label; ladder form is the standard pedagogical diagram. -->

  <!-- Left backbone (5' → 3') -->
  <g transform="translate(220, 100)">
    <text x="0" y="-15" fill="#0f172a" font-size="13" font-weight="700">5'</text>
    <text x="-25" y="345" fill="#0f172a" font-size="13" font-weight="700">3'</text>

    <!-- Phosphate-deoxyribose backbone (left strand) -->
    <g>
      <!-- Phosphates as circles -->
      <circle cx="0" cy="0" r="9" fill="#3b82f6" stroke="#1d4ed8" stroke-width="1.5"/>
      <text x="0" y="3" text-anchor="middle" fill="#ffffff" font-size="9" font-weight="700">P</text>
      <circle cx="0" cy="80" r="9" fill="#3b82f6" stroke="#1d4ed8" stroke-width="1.5"/>
      <text x="0" y="83" text-anchor="middle" fill="#ffffff" font-size="9" font-weight="700">P</text>
      <circle cx="0" cy="160" r="9" fill="#3b82f6" stroke="#1d4ed8" stroke-width="1.5"/>
      <text x="0" y="163" text-anchor="middle" fill="#ffffff" font-size="9" font-weight="700">P</text>
      <circle cx="0" cy="240" r="9" fill="#3b82f6" stroke="#1d4ed8" stroke-width="1.5"/>
      <text x="0" y="243" text-anchor="middle" fill="#ffffff" font-size="9" font-weight="700">P</text>
      <circle cx="0" cy="320" r="9" fill="#3b82f6" stroke="#1d4ed8" stroke-width="1.5"/>
      <text x="0" y="323" text-anchor="middle" fill="#ffffff" font-size="9" font-weight="700">P</text>

      <!-- Sugars as pentagons (simplified as small rotated squares) -->
      <rect x="-7" y="33" width="14" height="14" rx="2" fill="#fef3c7" stroke="#a16207" stroke-width="1.5"/>
      <text x="0" y="44" text-anchor="middle" fill="#854d0e" font-size="8" font-weight="700">S</text>
      <rect x="-7" y="113" width="14" height="14" rx="2" fill="#fef3c7" stroke="#a16207" stroke-width="1.5"/>
      <text x="0" y="124" text-anchor="middle" fill="#854d0e" font-size="8" font-weight="700">S</text>
      <rect x="-7" y="193" width="14" height="14" rx="2" fill="#fef3c7" stroke="#a16207" stroke-width="1.5"/>
      <text x="0" y="204" text-anchor="middle" fill="#854d0e" font-size="8" font-weight="700">S</text>
      <rect x="-7" y="273" width="14" height="14" rx="2" fill="#fef3c7" stroke="#a16207" stroke-width="1.5"/>
      <text x="0" y="284" text-anchor="middle" fill="#854d0e" font-size="8" font-weight="700">S</text>

      <!-- Backbone lines -->
      <line x1="0" y1="10" x2="0" y2="32" stroke="#64748b" stroke-width="2"/>
      <line x1="0" y1="48" x2="0" y2="71" stroke="#64748b" stroke-width="2"/>
      <line x1="0" y1="90" x2="0" y2="112" stroke="#64748b" stroke-width="2"/>
      <line x1="0" y1="128" x2="0" y2="151" stroke="#64748b" stroke-width="2"/>
      <line x1="0" y1="170" x2="0" y2="192" stroke="#64748b" stroke-width="2"/>
      <line x1="0" y1="208" x2="0" y2="231" stroke="#64748b" stroke-width="2"/>
      <line x1="0" y1="250" x2="0" y2="272" stroke="#64748b" stroke-width="2"/>
      <line x1="0" y1="288" x2="0" y2="311" stroke="#64748b" stroke-width="2"/>
    </g>
  </g>

  <!-- Right backbone (3' → 5' antiparallel) -->
  <g transform="translate(380, 100)">
    <text x="0" y="-15" fill="#0f172a" font-size="13" font-weight="700">3'</text>
    <text x="-15" y="345" fill="#0f172a" font-size="13" font-weight="700">5'</text>

    <g>
      <circle cx="0" cy="0" r="9" fill="#3b82f6" stroke="#1d4ed8" stroke-width="1.5"/>
      <text x="0" y="3" text-anchor="middle" fill="#ffffff" font-size="9" font-weight="700">P</text>
      <circle cx="0" cy="80" r="9" fill="#3b82f6" stroke="#1d4ed8" stroke-width="1.5"/>
      <text x="0" y="83" text-anchor="middle" fill="#ffffff" font-size="9" font-weight="700">P</text>
      <circle cx="0" cy="160" r="9" fill="#3b82f6" stroke="#1d4ed8" stroke-width="1.5"/>
      <text x="0" y="163" text-anchor="middle" fill="#ffffff" font-size="9" font-weight="700">P</text>
      <circle cx="0" cy="240" r="9" fill="#3b82f6" stroke="#1d4ed8" stroke-width="1.5"/>
      <text x="0" y="243" text-anchor="middle" fill="#ffffff" font-size="9" font-weight="700">P</text>
      <circle cx="0" cy="320" r="9" fill="#3b82f6" stroke="#1d4ed8" stroke-width="1.5"/>
      <text x="0" y="323" text-anchor="middle" fill="#ffffff" font-size="9" font-weight="700">P</text>

      <rect x="-7" y="33" width="14" height="14" rx="2" fill="#fef3c7" stroke="#a16207" stroke-width="1.5"/>
      <text x="0" y="44" text-anchor="middle" fill="#854d0e" font-size="8" font-weight="700">S</text>
      <rect x="-7" y="113" width="14" height="14" rx="2" fill="#fef3c7" stroke="#a16207" stroke-width="1.5"/>
      <text x="0" y="124" text-anchor="middle" fill="#854d0e" font-size="8" font-weight="700">S</text>
      <rect x="-7" y="193" width="14" height="14" rx="2" fill="#fef3c7" stroke="#a16207" stroke-width="1.5"/>
      <text x="0" y="204" text-anchor="middle" fill="#854d0e" font-size="8" font-weight="700">S</text>
      <rect x="-7" y="273" width="14" height="14" rx="2" fill="#fef3c7" stroke="#a16207" stroke-width="1.5"/>
      <text x="0" y="284" text-anchor="middle" fill="#854d0e" font-size="8" font-weight="700">S</text>

      <line x1="0" y1="10" x2="0" y2="32" stroke="#64748b" stroke-width="2"/>
      <line x1="0" y1="48" x2="0" y2="71" stroke="#64748b" stroke-width="2"/>
      <line x1="0" y1="90" x2="0" y2="112" stroke="#64748b" stroke-width="2"/>
      <line x1="0" y1="128" x2="0" y2="151" stroke="#64748b" stroke-width="2"/>
      <line x1="0" y1="170" x2="0" y2="192" stroke="#64748b" stroke-width="2"/>
      <line x1="0" y1="208" x2="0" y2="231" stroke="#64748b" stroke-width="2"/>
      <line x1="0" y1="250" x2="0" y2="272" stroke="#64748b" stroke-width="2"/>
      <line x1="0" y1="288" x2="0" y2="311" stroke="#64748b" stroke-width="2"/>
    </g>
  </g>

  <!-- ===== Base pairs (rungs between strands) ===== -->
  <!-- A=T (2 H-bonds) at y=140 -->
  <g transform="translate(220, 140)">
    <rect x="10" y="-12" width="42" height="24" rx="4" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
    <text x="31" y="4" text-anchor="middle" fill="#991b1b" font-size="13" font-weight="700">A</text>
    <!-- 2 H-bonds (dashed) -->
    <line x1="55" y1="-5" x2="105" y2="-5" stroke="#64748b" stroke-width="1.5" stroke-dasharray="3 3"/>
    <line x1="55" y1="5" x2="105" y2="5" stroke="#64748b" stroke-width="1.5" stroke-dasharray="3 3"/>
    <rect x="108" y="-12" width="42" height="24" rx="4" fill="#fef3c7" stroke="#a16207" stroke-width="1.5"/>
    <text x="129" y="4" text-anchor="middle" fill="#854d0e" font-size="13" font-weight="700">T</text>
  </g>

  <!-- G≡C (3 H-bonds) at y=220 -->
  <g transform="translate(220, 220)">
    <rect x="10" y="-12" width="42" height="24" rx="4" fill="#dbeafe" stroke="#1d4ed8" stroke-width="1.5"/>
    <text x="31" y="4" text-anchor="middle" fill="#1e3a8a" font-size="13" font-weight="700">G</text>
    <line x1="55" y1="-8" x2="105" y2="-8" stroke="#64748b" stroke-width="1.5" stroke-dasharray="3 3"/>
    <line x1="55" y1="0" x2="105" y2="0" stroke="#64748b" stroke-width="1.5" stroke-dasharray="3 3"/>
    <line x1="55" y1="8" x2="105" y2="8" stroke="#64748b" stroke-width="1.5" stroke-dasharray="3 3"/>
    <rect x="108" y="-12" width="42" height="24" rx="4" fill="#dcfce7" stroke="#15803d" stroke-width="1.5"/>
    <text x="129" y="4" text-anchor="middle" fill="#14532d" font-size="13" font-weight="700">C</text>
  </g>

  <!-- T=A (2 H-bonds) at y=300 -->
  <g transform="translate(220, 300)">
    <rect x="10" y="-12" width="42" height="24" rx="4" fill="#fef3c7" stroke="#a16207" stroke-width="1.5"/>
    <text x="31" y="4" text-anchor="middle" fill="#854d0e" font-size="13" font-weight="700">T</text>
    <line x1="55" y1="-5" x2="105" y2="-5" stroke="#64748b" stroke-width="1.5" stroke-dasharray="3 3"/>
    <line x1="55" y1="5" x2="105" y2="5" stroke="#64748b" stroke-width="1.5" stroke-dasharray="3 3"/>
    <rect x="108" y="-12" width="42" height="24" rx="4" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
    <text x="129" y="4" text-anchor="middle" fill="#991b1b" font-size="13" font-weight="700">A</text>
  </g>

  <!-- C≡G (3 H-bonds) at y=380 -->
  <g transform="translate(220, 380)">
    <rect x="10" y="-12" width="42" height="24" rx="4" fill="#dcfce7" stroke="#15803d" stroke-width="1.5"/>
    <text x="31" y="4" text-anchor="middle" fill="#14532d" font-size="13" font-weight="700">C</text>
    <line x1="55" y1="-8" x2="105" y2="-8" stroke="#64748b" stroke-width="1.5" stroke-dasharray="3 3"/>
    <line x1="55" y1="0" x2="105" y2="0" stroke="#64748b" stroke-width="1.5" stroke-dasharray="3 3"/>
    <line x1="55" y1="8" x2="105" y2="8" stroke="#64748b" stroke-width="1.5" stroke-dasharray="3 3"/>
    <rect x="108" y="-12" width="42" height="24" rx="4" fill="#dbeafe" stroke="#1d4ed8" stroke-width="1.5"/>
    <text x="129" y="4" text-anchor="middle" fill="#1e3a8a" font-size="13" font-weight="700">G</text>
  </g>

  <!-- ===== Right-side legend ===== -->
  <g transform="translate(490, 100)">
    <text x="0" y="0" fill="#0f172a" font-size="15" font-weight="700">Key Features</text>

    <text x="0" y="32" fill="#0f172a" font-size="13" font-weight="600">Backbone</text>
    <circle cx="10" cy="48" r="8" fill="#3b82f6" stroke="#1d4ed8" stroke-width="1.5"/>
    <text x="10" y="51" text-anchor="middle" fill="#ffffff" font-size="8" font-weight="700">P</text>
    <text x="25" y="52" fill="#334155" font-size="12">Phosphate group</text>

    <rect x="2" y="63" width="16" height="16" rx="2" fill="#fef3c7" stroke="#a16207" stroke-width="1.5"/>
    <text x="10" y="75" text-anchor="middle" fill="#854d0e" font-size="10" font-weight="700">S</text>
    <text x="25" y="76" fill="#334155" font-size="12">Deoxyribose sugar</text>

    <text x="0" y="115" fill="#0f172a" font-size="13" font-weight="600">Bases (purines + pyrimidines)</text>
    <rect x="0" y="125" width="22" height="18" rx="3" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
    <text x="11" y="138" text-anchor="middle" fill="#991b1b" font-size="11" font-weight="700">A</text>
    <text x="30" y="138" fill="#334155" font-size="12">Adenine (purine)</text>

    <rect x="0" y="150" width="22" height="18" rx="3" fill="#fef3c7" stroke="#a16207" stroke-width="1.5"/>
    <text x="11" y="163" text-anchor="middle" fill="#854d0e" font-size="11" font-weight="700">T</text>
    <text x="30" y="163" fill="#334155" font-size="12">Thymine (pyrimidine)</text>

    <rect x="0" y="175" width="22" height="18" rx="3" fill="#dbeafe" stroke="#1d4ed8" stroke-width="1.5"/>
    <text x="11" y="188" text-anchor="middle" fill="#1e3a8a" font-size="11" font-weight="700">G</text>
    <text x="30" y="188" fill="#334155" font-size="12">Guanine (purine)</text>

    <rect x="0" y="200" width="22" height="18" rx="3" fill="#dcfce7" stroke="#15803d" stroke-width="1.5"/>
    <text x="11" y="213" text-anchor="middle" fill="#14532d" font-size="11" font-weight="700">C</text>
    <text x="30" y="213" fill="#334155" font-size="12">Cytosine (pyrimidine)</text>

    <text x="0" y="245" fill="#0f172a" font-size="13" font-weight="600">Chargaff's rule</text>
    <text x="0" y="262" fill="#334155" font-size="11">A pairs with T (2 H-bonds)</text>
    <text x="0" y="278" fill="#334155" font-size="11">G pairs with C (3 H-bonds)</text>

    <text x="0" y="305" fill="#0f172a" font-size="13" font-weight="600">Helix dimensions</text>
    <text x="0" y="322" fill="#334155" font-size="11">• Diameter: 2 nm (20 Å)</text>
    <text x="0" y="338" fill="#334155" font-size="11">• Pitch: 3.4 nm / turn</text>
    <text x="0" y="354" fill="#334155" font-size="11">• 10 base pairs per turn</text>
  </g>
</svg>
