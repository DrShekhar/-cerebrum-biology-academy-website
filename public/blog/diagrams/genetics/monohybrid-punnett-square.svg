<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540" role="img" aria-labelledby="punnett-title punnett-desc" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <title id="punnett-title">Monohybrid cross — Punnett square (Tt × Tt)</title>
  <desc id="punnett-desc">Punnett square showing a monohybrid cross between two heterozygous tall pea plants (Tt × Tt) producing F2 generation with TT, Tt, Tt, tt — a 3:1 phenotypic ratio (3 tall : 1 dwarf) and 1:2:1 genotypic ratio.</desc>

  <rect width="800" height="540" fill="#f8fafc"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" fill="#0f172a" font-size="20" font-weight="700">Monohybrid Cross — Mendel's Law of Segregation</text>
  <text x="400" y="58" text-anchor="middle" fill="#475569" font-size="13">Heterozygous tall × heterozygous tall (Tt × Tt) → 3:1 phenotypic ratio</text>

  <!-- ============ F1 → F2 setup ============ -->
  <g transform="translate(60, 90)">
    <!-- Parent 1 -->
    <rect x="0" y="0" width="120" height="50" rx="8" fill="#16a34a" stroke="#15803d" stroke-width="2"/>
    <text x="60" y="32" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="700">Tt</text>
    <text x="60" y="70" text-anchor="middle" fill="#0f172a" font-size="12">Parent 1 (Tall)</text>

    <!-- × symbol -->
    <text x="160" y="34" text-anchor="middle" fill="#475569" font-size="22" font-weight="700">×</text>

    <!-- Parent 2 -->
    <rect x="200" y="0" width="120" height="50" rx="8" fill="#16a34a" stroke="#15803d" stroke-width="2"/>
    <text x="260" y="32" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="700">Tt</text>
    <text x="260" y="70" text-anchor="middle" fill="#0f172a" font-size="12">Parent 2 (Tall)</text>

    <!-- Gametes label -->
    <text x="160" y="105" text-anchor="middle" fill="#475569" font-size="12" font-style="italic">↓ produces gametes ↓</text>

    <!-- Gamete pills -->
    <g transform="translate(0, 120)">
      <ellipse cx="30" cy="14" rx="22" ry="14" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
      <text x="30" y="19" text-anchor="middle" fill="#15803d" font-size="14" font-weight="700">T</text>
      <ellipse cx="90" cy="14" rx="22" ry="14" fill="#fef9c3" stroke="#a16207" stroke-width="2"/>
      <text x="90" y="19" text-anchor="middle" fill="#854d0e" font-size="14" font-weight="700">t</text>

      <ellipse cx="230" cy="14" rx="22" ry="14" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
      <text x="230" y="19" text-anchor="middle" fill="#15803d" font-size="14" font-weight="700">T</text>
      <ellipse cx="290" cy="14" rx="22" ry="14" fill="#fef9c3" stroke="#a16207" stroke-width="2"/>
      <text x="290" y="19" text-anchor="middle" fill="#854d0e" font-size="14" font-weight="700">t</text>
    </g>
  </g>

  <!-- ============ Punnett square ============ -->
  <g transform="translate(440, 90)">
    <!-- Header labels (gametes from parent 1 at top) -->
    <text x="100" y="0" text-anchor="middle" fill="#0f172a" font-size="13" font-weight="600">Parent 1 gametes →</text>

    <!-- Top column labels -->
    <rect x="70" y="20" width="60" height="38" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="100" y="46" text-anchor="middle" fill="#15803d" font-size="22" font-weight="700">T</text>
    <rect x="140" y="20" width="60" height="38" rx="6" fill="#fef9c3" stroke="#a16207" stroke-width="2"/>
    <text x="170" y="46" text-anchor="middle" fill="#854d0e" font-size="22" font-weight="700">t</text>

    <!-- Left row labels (gametes from parent 2) -->
    <text x="-15" y="80" text-anchor="middle" fill="#0f172a" font-size="13" font-weight="600" transform="rotate(-90, -15, 80)">Parent 2 gametes →</text>
    <rect x="0" y="68" width="60" height="60" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="30" y="106" text-anchor="middle" fill="#15803d" font-size="22" font-weight="700">T</text>
    <rect x="0" y="138" width="60" height="60" rx="6" fill="#fef9c3" stroke="#a16207" stroke-width="2"/>
    <text x="30" y="176" text-anchor="middle" fill="#854d0e" font-size="22" font-weight="700">t</text>

    <!-- Punnett grid 2x2 -->
    <!-- TT (top-left) -->
    <rect x="70" y="68" width="60" height="60" rx="6" fill="#bbf7d0" stroke="#15803d" stroke-width="2"/>
    <text x="100" y="98" text-anchor="middle" fill="#14532d" font-size="22" font-weight="700">TT</text>
    <text x="100" y="118" text-anchor="middle" fill="#14532d" font-size="10">homozygous tall</text>

    <!-- Tt (top-right) -->
    <rect x="140" y="68" width="60" height="60" rx="6" fill="#86efac" stroke="#16a34a" stroke-width="2"/>
    <text x="170" y="98" text-anchor="middle" fill="#14532d" font-size="22" font-weight="700">Tt</text>
    <text x="170" y="118" text-anchor="middle" fill="#14532d" font-size="10">heterozygous tall</text>

    <!-- Tt (bottom-left) -->
    <rect x="70" y="138" width="60" height="60" rx="6" fill="#86efac" stroke="#16a34a" stroke-width="2"/>
    <text x="100" y="168" text-anchor="middle" fill="#14532d" font-size="22" font-weight="700">Tt</text>
    <text x="100" y="188" text-anchor="middle" fill="#14532d" font-size="10">heterozygous tall</text>

    <!-- tt (bottom-right) -->
    <rect x="140" y="138" width="60" height="60" rx="6" fill="#fde68a" stroke="#a16207" stroke-width="2"/>
    <text x="170" y="168" text-anchor="middle" fill="#854d0e" font-size="22" font-weight="700">tt</text>
    <text x="170" y="188" text-anchor="middle" fill="#854d0e" font-size="10">homozygous dwarf</text>
  </g>

  <!-- ============ Results panel ============ -->
  <g transform="translate(60, 320)">
    <rect x="0" y="0" width="680" height="180" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
    <text x="20" y="32" fill="#0f172a" font-size="16" font-weight="700">F₂ Generation Results</text>

    <!-- Genotypic ratio -->
    <g transform="translate(30, 60)">
      <text x="0" y="0" fill="#0f172a" font-size="14" font-weight="600">Genotypic ratio</text>
      <text x="0" y="24" fill="#15803d" font-size="20" font-weight="700">1 TT : 2 Tt : 1 tt</text>
      <text x="0" y="48" fill="#475569" font-size="12">→ 25% homozygous dominant</text>
      <text x="0" y="66" fill="#475569" font-size="12">→ 50% heterozygous</text>
      <text x="0" y="84" fill="#475569" font-size="12">→ 25% homozygous recessive</text>
    </g>

    <!-- Divider -->
    <line x1="340" y1="50" x2="340" y2="160" stroke="#e2e8f0" stroke-width="1"/>

    <!-- Phenotypic ratio -->
    <g transform="translate(360, 60)">
      <text x="0" y="0" fill="#0f172a" font-size="14" font-weight="600">Phenotypic ratio</text>
      <text x="0" y="24" fill="#15803d" font-size="20" font-weight="700">3 Tall : 1 Dwarf</text>
      <text x="0" y="48" fill="#475569" font-size="12">→ 75% tall (TT + Tt express dominant T)</text>
      <text x="0" y="66" fill="#475569" font-size="12">→ 25% dwarf (only tt expresses recessive)</text>
      <text x="0" y="92" fill="#0f172a" font-size="11" font-style="italic">This 3:1 ratio confirms Mendel's</text>
      <text x="0" y="107" fill="#0f172a" font-size="11" font-style="italic">Law of Segregation.</text>
    </g>
  </g>
</svg>
