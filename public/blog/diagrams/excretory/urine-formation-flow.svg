<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" role="img" aria-labelledby="urine-title urine-desc" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <title id="urine-title">Urine formation — three-step process</title>
  <desc id="urine-desc">Flow diagram showing the three processes of urine formation: glomerular filtration in Bowman's capsule, tubular reabsorption in PCT/Loop of Henle/DCT, and tubular secretion in DCT and collecting duct, ending in final urine output.</desc>

  <rect width="800" height="460" fill="#f8fafc"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#0f172a" font-size="20" font-weight="700">Urine Formation: Three Sequential Processes</text>
  <text x="400" y="55" text-anchor="middle" fill="#475569" font-size="13">From 180 L/day of filtrate → 1.5 L/day of urine</text>

  <!-- ============ STEP 1: Glomerular Filtration ============ -->
  <g transform="translate(40, 90)">
    <rect width="220" height="280" rx="14" fill="#fef3c7" stroke="#a16207" stroke-width="2"/>
    <text x="110" y="30" text-anchor="middle" fill="#92400e" font-size="13" font-weight="700">STEP 1</text>
    <text x="110" y="52" text-anchor="middle" fill="#0f172a" font-size="16" font-weight="700">Glomerular Filtration</text>
    <text x="110" y="72" text-anchor="middle" fill="#475569" font-size="12">In Bowman's capsule</text>

    <!-- Glomerulus icon -->
    <g transform="translate(50, 90)">
      <circle cx="60" cy="40" r="34" fill="#fecaca" stroke="#dc2626" stroke-width="2"/>
      <path d="M 40 30 Q 55 28 70 35 Q 60 45 50 42 Q 65 50 75 40 Q 70 60 55 56 Q 60 46 48 42 Q 55 32 65 40"
            stroke="#dc2626" stroke-width="1.5" fill="none"/>
    </g>

    <text x="110" y="195" text-anchor="middle" fill="#0f172a" font-size="13" font-weight="600">Pressure-driven</text>
    <text x="110" y="213" text-anchor="middle" fill="#334155" font-size="11">High glomerular BP forces</text>
    <text x="110" y="227" text-anchor="middle" fill="#334155" font-size="11">water + small solutes out</text>

    <!-- Key facts -->
    <text x="20" y="252" fill="#0f172a" font-size="11" font-weight="700">GFR: ~125 mL/min</text>
    <text x="20" y="267" fill="#334155" font-size="11">≈ 180 L filtrate / day</text>
  </g>

  <!-- Arrow 1 → 2 -->
  <path d="M 265 230 L 295 230" stroke="#64748b" stroke-width="3" fill="none"/>
  <path d="M 295 230 L 287 225 L 287 235 Z" fill="#64748b"/>

  <!-- ============ STEP 2: Tubular Reabsorption ============ -->
  <g transform="translate(300, 90)">
    <rect width="220" height="280" rx="14" fill="#cffafe" stroke="#0e7490" stroke-width="2"/>
    <text x="110" y="30" text-anchor="middle" fill="#0e7490" font-size="13" font-weight="700">STEP 2</text>
    <text x="110" y="52" text-anchor="middle" fill="#0f172a" font-size="16" font-weight="700">Tubular Reabsorption</text>
    <text x="110" y="72" text-anchor="middle" fill="#475569" font-size="12">PCT + Loop of Henle + DCT</text>

    <!-- Tubule icon with reabsorption arrows -->
    <g transform="translate(40, 95)">
      <rect x="30" y="0" width="80" height="80" rx="6" fill="#a5f3fc" stroke="#0891b2" stroke-width="2"/>
      <text x="70" y="46" text-anchor="middle" fill="#0e7490" font-size="11" font-weight="600">Filtrate</text>
      <!-- Reabsorption arrows pointing OUT to blood -->
      <path d="M 30 20 L 8 20" stroke="#16a34a" stroke-width="2"/>
      <path d="M 8 20 L 16 16 L 16 24 Z" fill="#16a34a"/>
      <path d="M 30 40 L 8 40" stroke="#16a34a" stroke-width="2"/>
      <path d="M 8 40 L 16 36 L 16 44 Z" fill="#16a34a"/>
      <path d="M 30 60 L 8 60" stroke="#16a34a" stroke-width="2"/>
      <path d="M 8 60 L 16 56 L 16 64 Z" fill="#16a34a"/>
      <text x="-30" y="44" fill="#15803d" font-size="11" font-weight="600">to blood</text>
    </g>

    <text x="110" y="200" text-anchor="middle" fill="#0f172a" font-size="13" font-weight="600">Selective reabsorption</text>
    <text x="20" y="220" fill="#334155" font-size="11">• Glucose, amino acids (100%)</text>
    <text x="20" y="235" fill="#334155" font-size="11">• Water (~99%)</text>
    <text x="20" y="250" fill="#334155" font-size="11">• Na⁺, K⁺, Cl⁻, HCO₃⁻ (most)</text>
    <text x="20" y="265" fill="#475569" font-size="10" font-style="italic">Active + passive transport</text>
  </g>

  <!-- Arrow 2 → 3 -->
  <path d="M 525 230 L 555 230" stroke="#64748b" stroke-width="3" fill="none"/>
  <path d="M 555 230 L 547 225 L 547 235 Z" fill="#64748b"/>

  <!-- ============ STEP 3: Tubular Secretion ============ -->
  <g transform="translate(560, 90)">
    <rect width="220" height="280" rx="14" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
    <text x="110" y="30" text-anchor="middle" fill="#6d28d9" font-size="13" font-weight="700">STEP 3</text>
    <text x="110" y="52" text-anchor="middle" fill="#0f172a" font-size="16" font-weight="700">Tubular Secretion</text>
    <text x="110" y="72" text-anchor="middle" fill="#475569" font-size="12">DCT + collecting duct</text>

    <!-- Tubule icon with secretion arrows -->
    <g transform="translate(40, 95)">
      <rect x="30" y="0" width="80" height="80" rx="6" fill="#ddd6fe" stroke="#7c3aed" stroke-width="2"/>
      <text x="70" y="46" text-anchor="middle" fill="#6d28d9" font-size="11" font-weight="600">Filtrate</text>
      <!-- Secretion arrows pointing IN from blood -->
      <path d="M 132 20 L 110 20" stroke="#dc2626" stroke-width="2"/>
      <path d="M 110 20 L 118 16 L 118 24 Z" fill="#dc2626"/>
      <path d="M 132 40 L 110 40" stroke="#dc2626" stroke-width="2"/>
      <path d="M 110 40 L 118 36 L 118 44 Z" fill="#dc2626"/>
      <path d="M 132 60 L 110 60" stroke="#dc2626" stroke-width="2"/>
      <path d="M 110 60 L 118 56 L 118 64 Z" fill="#dc2626"/>
      <text x="135" y="44" fill="#991b1b" font-size="11" font-weight="600">from blood</text>
    </g>

    <text x="110" y="200" text-anchor="middle" fill="#0f172a" font-size="13" font-weight="600">Active secretion</text>
    <text x="20" y="220" fill="#334155" font-size="11">• H⁺ ions (pH control)</text>
    <text x="20" y="235" fill="#334155" font-size="11">• K⁺ excess</text>
    <text x="20" y="250" fill="#334155" font-size="11">• NH₃, drugs, toxins, creatinine</text>
    <text x="20" y="265" fill="#475569" font-size="10" font-style="italic">Maintains acid-base balance</text>
  </g>

  <!-- Final output -->
  <g transform="translate(280, 395)">
    <rect width="240" height="44" rx="22" fill="#0f172a"/>
    <text x="120" y="22" text-anchor="middle" fill="#facc15" font-size="14" font-weight="700">↓ Final Urine ↓</text>
    <text x="120" y="38" text-anchor="middle" fill="#e2e8f0" font-size="11">~1.5 L / day • 95% water • urea, salts</text>
  </g>

  <!-- Funnel arrows to final -->
  <path d="M 150 380 L 320 408" stroke="#64748b" stroke-width="2" stroke-dasharray="4 3" fill="none"/>
  <path d="M 410 380 L 410 395" stroke="#64748b" stroke-width="2" stroke-dasharray="4 3" fill="none"/>
  <path d="M 670 380 L 500 408" stroke="#64748b" stroke-width="2" stroke-dasharray="4 3" fill="none"/>
</svg>
