<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad-usabo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d9488;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f766e;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#grad-usabo)"/>

  <!-- DNA double helix motif (right side) -->
  <g transform="translate(880, 315)" stroke="#ffffff" stroke-width="6" fill="none" opacity="0.35">
    <path d="M -60 -220 C 60 -160, 60 -100, -60 -40 C -180 20, -180 80, -60 140 C 60 200, 60 220, -60 220"/>
    <path d="M 60 -220 C -60 -160, -60 -100, 60 -40 C 180 20, 180 80, 60 140 C -60 200, -60 220, 60 220"/>
    <line x1="-52" y1="-190" x2="52" y2="-190"/>
    <line x1="-20" y1="-130" x2="20" y2="-130"/>
    <line x1="-52" y1="-70" x2="52" y2="-70"/>
    <line x1="-20" y1="-10" x2="20" y2="-10"/>
    <line x1="-52" y1="50" x2="52" y2="50"/>
    <line x1="-20" y1="110" x2="20" y2="110"/>
    <line x1="-52" y1="170" x2="52" y2="170"/>
  </g>

  <!-- Medal / achievement mark (top left) -->
  <g transform="translate(150, 150)" opacity="0.9">
    <circle cx="0" cy="0" r="52" fill="#ffffff" opacity="0.15"/>
    <circle cx="0" cy="0" r="34" fill="none" stroke="#fde68a" stroke-width="6"/>
    <path d="M -14 -6 L 0 8 L 22 -18" fill="none" stroke="#fde68a" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Title text -->
  <text x="100" y="330" font-family="Arial, Helvetica, sans-serif" font-size="86" font-weight="800" fill="#ffffff">USABO &amp; IBO</text>
  <text x="102" y="404" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="600" fill="#ccfbf1">Biology Olympiad Preparation</text>

  <!-- Sub / brand -->
  <rect x="100" y="452" width="560" height="4" rx="2" fill="#5eead4" opacity="0.7"/>
  <text x="100" y="510" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="500" fill="#a7f3d0">Open Exam &#183; Semifinal &#183; National Finals &#183; Team USA</text>
  <text x="100" y="556" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#ffffff">Cerebrum Biology Academy</text>
</svg>
