<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="IB Biology IA Statistical Tests Guide">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#134e4a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="960" cy="120" r="180" fill="#10b981" opacity="0.12"/>
  <circle cx="180" cy="520" r="160" fill="#06b6d4" opacity="0.10"/>
  <text x="80" y="140" fill="#a7f3d0" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="600" letter-spacing="2">CEREBRUM · IB BIOLOGY 2025</text>
  <text x="80" y="250" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="68" font-weight="800">IA Statistical Tests</text>
  <text x="80" y="330" fill="url(#accent)" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="700">t-test · ANOVA · χ²</text>
  <text x="80" y="430" fill="#e2e8f0" font-family="system-ui, -apple-system, sans-serif" font-size="30" font-weight="400">The 5-second decision tree for the 2025 IA rubric</text>
  <g transform="translate(80, 500)">
    <rect width="220" height="50" rx="8" fill="#10b981" opacity="0.2" stroke="#10b981" stroke-width="2"/>
    <text x="110" y="32" fill="#a7f3d0" font-family="system-ui, sans-serif" font-size="20" font-weight="600" text-anchor="middle">Data Analysis · 6 marks</text>
